<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="InventoryPro - Enterprise Inventory Management System" />
    <title>InventoryPro - Enterprise IMS</title>
    <style>
      body { font-family: system-ui, sans-serif; background: #0f172a; color: #f1f5f9; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      .container { text-align: center; padding: 2rem; }
      .logo { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #0ea5e9, #d946ef); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
      .status { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; background: #1e293b; border-radius: 9999px; font-size: 0.875rem; margin-bottom: 2rem; }
      .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }
      .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
      .link { padding: 0.75rem 1.5rem; background: #1e293b; color: #f1f5f9; text-decoration: none; border-radius: 0.75rem; font-weight: 500; transition: background 0.2s; }
      .link:hover { background: #334155; }
      .info { margin-top: 2rem; font-size: 0.875rem; color: #94a3b8; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">InventoryPro</div>
      <div class="status"><span class="dot"></span> Ready to Deploy</div>
      <div class="links">
        <a href="client/dist/index.html" class="link">Frontend (dist/)</a>
        <a href="README.md" class="link">Documentation</a>
        <a href="DEPLOY.md" class="link">Deploy Guide</a>
      </div>
      <div class="info">
        <p>Tech Stack: React + Vite + Tailwind | Node.js + Express + PostgreSQL</p>
        <p>Admin: admin@inventorypro.com / admin123</p>
      </div>
    </div>
  </body>
</html>
